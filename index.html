<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="A curated, event-anchored DC Comics reading tracker from Crisis on Infinite Earths through DC All In.">
  <title>DC Reading Tracker</title>
  <script>
    (() => {
      try {
        const saved = JSON.parse(localStorage.getItem('dcrt-v6-state'));
        const preference = saved?.preferences?.theme || 'system';
        const dark = matchMedia('(prefers-color-scheme: dark)').matches;
        document.documentElement.dataset.theme = preference === 'system' ? (dark ? 'dark' : 'light') : preference;
      } catch {}
    })();
  </script>
  <link rel="stylesheet" href="assets/css/variables.css">
  <link rel="stylesheet" href="assets/css/base.css">
  <link rel="stylesheet" href="assets/css/layout.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <link rel="stylesheet" href="assets/css/roadmap.css">
  <link rel="stylesheet" href="assets/css/events.css">
  <link rel="stylesheet" href="assets/css/themes.css">
  <link rel="stylesheet" href="assets/css/responsive.css">
</head>
<body>
  <div id="loading-bar" class="loading-bar"></div>
  <header class="app-header">
    <div class="header-main">
      <a class="brand" href="#/dashboard" aria-label="DC Reading Tracker dashboard">
        <span class="brand-mark">DC</span>
        <span><strong>Reading Tracker</strong><small>The Long Box Project</small></span>
      </a>
      <div class="global-meter" aria-label="Global reading progress">
        <div><strong id="global-read">0</strong><small>read</small></div>
        <div class="header-progress"><span id="global-bar"></span></div>
        <div><strong id="global-pct">0%</strong><small><span id="global-total">0</span> total</small></div>
      </div>
      <div class="header-tools">
        <label class="era-picker"><span>Era</span><select id="era-select" aria-label="Choose era"></select></label>
        <button class="icon-button theme-button" data-action="cycle-theme" aria-label="Cycle light, dark and system theme">◐</button>
      </div>
    </div>
    <nav class="desktop-nav" aria-label="Primary navigation">
      <a href="#/dashboard" data-nav-view="dashboard">Dashboard</a>
      <a href="#/era/new52" data-nav-view="flow">Master Flow</a>
      <a href="#/route/new52" data-nav-view="route">Routes</a>
      <a href="#/event/new52" data-nav-view="event">Events</a>
      <a href="#/essentials" data-nav-view="essentials">Essentials</a>
      <a href="#/settings" data-nav-view="settings">Settings</a>
    </nav>
  </header>

  <main id="main" class="app-main" tabindex="-1"></main>

  <nav class="mobile-nav" aria-label="Mobile navigation">
    <a href="#/dashboard" data-nav-view="dashboard"><span>⌂</span>Home</a>
    <a href="#/era/new52" data-nav-view="flow"><span>☷</span>Flow</a>
    <a href="#/route/new52" data-nav-view="route"><span>⇢</span>Routes</a>
    <a href="#/event/new52" data-nav-view="event"><span>◆</span>Events</a>
    <a href="#/settings" data-nav-view="settings"><span>•••</span>More</a>
  </nav>

  <dialog id="details-dialog" class="details-dialog">
    <div id="details-content" class="details-content"></div>
  </dialog>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <script type="module" src="assets/js/app.js"></script>
</body>
</html>
