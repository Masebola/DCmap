<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DC Comics Reading Roadmap Tracker</title>
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --surface-hover: #1e1e1e;
    --border: #2a2a2a;
    --text: #e0e0e0;
    --text-muted: #888;
    --accent: #0078d4;
    --accent-hover: #106ebe;
    --success: #2ea043;
    --success-dim: #238636;
    --warning: #d29922;
    --danger: #cf222e;
    --batman: #f5c518;
    --superman: #0078d4;
    --wonder-woman: #cf222e;
    --green-lantern: #2ea043;
    --flash: #d29922;
    --sidebar-width: 280px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    overflow-x: hidden;
  }

  /* Header */
  .topbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 60px;
    background: linear-gradient(90deg, #0a0a0a 0%, #141414 100%);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    z-index: 1000;
  }

  .logo {
    font-size: 1.25rem;
    font-weight: 800;
    letter-spacing: -0.5px;
    background: linear-gradient(90deg, var(--batman), var(--superman), var(--wonder-woman));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .global-stats {
    display: flex;
    gap: 20px;
    align-items: center;
  }

  .stat-pill {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 0.85rem;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .stat-pill .value {
    font-weight: 700;
    color: var(--success);
  }

  .progress-ring {
    width: 32px;
    height: 32px;
    transform: rotate(-90deg);
  }

  .progress-ring circle {
    fill: none;
    stroke-width: 4;
  }

  .progress-ring .bg { stroke: var(--border); }
  .progress-ring .fg { stroke: var(--success); stroke-linecap: round; transition: stroke-dashoffset 0.5s ease; }

  /* Layout */
  .layout {
    display: flex;
    margin-top: 60px;
    min-height: calc(100vh - 60px);
  }

  /* Sidebar */
  .sidebar {
    width: var(--sidebar-width);
    background: var(--surface);
    border-right: 1px solid var(--border);
    position: fixed;
    top: 60px; bottom: 0;
    overflow-y: auto;
    padding: 16px 0;
  }

  .era-nav-item {
    padding: 12px 20px;
    cursor: pointer;
    border-left: 3px solid transparent;
    transition: all 0.2s;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .era-nav-item:hover { background: var(--surface-hover); }
  .era-nav-item.active {
    background: rgba(0,120,212,0.08);
    border-left-color: var(--accent);
  }

  .era-nav-title {
    font-weight: 600;
    font-size: 0.9rem;
  }

  .era-nav-sub {
    font-size: 0.75rem;
    color: var(--text-muted);
  }

  .era-nav-progress {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin-top: 6px;
    overflow: hidden;
  }

  .era-nav-progress-fill {
    height: 100%;
    background: var(--success);
    border-radius: 2px;
    transition: width 0.3s;
    width: 0%;
  }

  /* Main Content */
  .main {
    margin-left: var(--sidebar-width);
    flex: 1;
    padding: 24px 32px;
    max-width: 900px;
  }

  .era-header {
    margin-bottom: 24px;
  }

  .era-header h1 {
    font-size: 2rem;
    font-weight: 800;
    margin-bottom: 6px;
    letter-spacing: -0.5px;
  }

  .era-header .meta {
    color: var(--text-muted);
    font-size: 0.95rem;
  }

  .era-stats-bar {
    display: flex;
    gap: 16px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 18px;
    min-width: 140px;
    flex: 1;
  }

  .stat-card .label {
    font-size: 0.75rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 4px;
  }

  .stat-card .number {
    font-size: 1.5rem;
    font-weight: 700;
  }

  /* Block */
  .block {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 16px;
    overflow: hidden;
  }

  .block-header {
    padding: 16px 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    transition: background 0.2s;
  }

  .block-header:hover { background: var(--surface-hover); }

  .block-title-group {
    flex: 1;
  }

  .block-title {
    font-weight: 700;
    font-size: 1.05rem;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .block-date {
    font-size: 0.8rem;
    color: var(--text-muted);
    margin-top: 2px;
  }

  .block-progress {
    font-size: 0.85rem;
    color: var(--text-muted);
    white-space: nowrap;
  }

  .chevron {
    transition: transform 0.3s;
    color: var(--text-muted);
    font-size: 1.2rem;
  }

  .block.open .chevron { transform: rotate(180deg); }

  .block-body {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.4s ease;
  }

  .block.open .block-body {
    max-height: 20000px;
  }

  .block-content {
    padding: 0 20px 20px;
  }

  /* Runs */
  .run {
    border-bottom: 1px solid var(--border);
    padding: 12px 0;
  }

  .run:last-child { border-bottom: none; }

  .run-header {
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
  }

  .checkbox {
    width: 20px;
    height: 20px;
    border: 2px solid var(--border);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.2s;
    flex-shrink: 0;
    font-size: 0.75rem;
    color: transparent;
  }

  .checkbox:hover { border-color: var(--accent); }
  .checkbox.checked {
    background: var(--success);
    border-color: var(--success);
    color: white;
  }

  .checkbox.partial {
    background: var(--warning);
    border-color: var(--warning);
    color: white;
  }

  .run-info {
    flex: 1;
  }

  .run-title {
    font-weight: 600;
    font-size: 0.95rem;
  }

  .run-meta {
    font-size: 0.8rem;
    color: var(--text-muted);
  }

  .run-count {
    font-size: 0.85rem;
    color: var(--text-muted);
    white-space: nowrap;
  }

  .run-issues {
    display: none;
    padding: 10px 0 0 32px;
    gap: 8px;
    flex-wrap: wrap;
  }

  .run.expanded .run-issues { display: flex; }

  .issue-chip {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px 10px;
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.2s;
    user-select: none;
  }

  .issue-chip:hover { border-color: var(--accent); }
  .issue-chip.read {
    background: rgba(46,160,67,0.15);
    border-color: var(--success);
    color: var(--success);
  }

  .expand-btn {
    font-size: 0.75rem;
    color: var(--accent);
    cursor: pointer;
    margin-left: 32px;
    margin-top: 6px;
    display: inline-block;
  }

  .expand-btn:hover { text-decoration: underline; }

  /* Event badge */
  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 0.7rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-left: 8px;
  }

  .badge-event { background: rgba(207,34,46,0.15); color: var(--danger); border: 1px solid rgba(207,34,46,0.3); }
  .badge-essential { background: rgba(245,197,24,0.15); color: var(--batman); border: 1px solid rgba(245,197,24,0.3); }
  .badge-optional { background: rgba(136,136,136,0.15); color: var(--text-muted); border: 1px solid rgba(136,136,136,0.3); }

  /* Mobile */
  @media (max-width: 768px) {
    .sidebar {
      width: 100%;
      position: relative;
      top: 0;
      border-right: none;
      border-bottom: 1px solid var(--border);
      max-height: 200px;
    }
    .main { margin-left: 0; padding: 16px; }
    .layout { flex-direction: column; }
    .global-stats { display: none; }
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: #444; }

  /* Reset button */
  .actions {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
  }

  .btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 16px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.85rem;
    transition: all 0.2s;
  }

  .btn:hover { background: var(--surface-hover); border-color: var(--accent); }
  .btn-danger:hover { border-color: var(--danger); color: var(--danger); }

  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 12px 20px;
    border-radius: 10px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    transform: translateY(100px);
    opacity: 0;
    transition: all 0.3s;
    z-index: 2000;
  }

  .toast.show { transform: translateY(0); opacity: 1; }
</style>

// ===================== STATE =====================
let state = {};
let currentEraId = roadmap[0].id;

function loadState() {
  try {
    const raw = localStorage.getItem('dcRoadmapState');
    if (raw) state = JSON.parse(raw);
  } catch(e) { state = {}; }
}

function saveState() {
  localStorage.setItem('dcRoadmapState', JSON.stringify(state));
  showToast('Progress saved');
  updateAllStats();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function getRunKey(eraId, blockId, runIdx) {
  return `${eraId}::${blockId}::${runIdx}`;
}

function isRunComplete(eraId, blockId, runIdx, issues) {
  const key = getRunKey(eraId, blockId, runIdx);
  const arr = state[key] || [];
  return arr.length >= issues;
}

function isRunPartial(eraId, blockId, runIdx, issues) {
  const key = getRunKey(eraId, blockId, runIdx);
  const arr = state[key] || [];
  return arr.length > 0 && arr.length < issues;
}

function toggleRun(eraId, blockId, runIdx, issues) {
  const key = getRunKey(eraId, blockId, runIdx);
  const arr = state[key] || [];
  if (arr.length >= issues) {
    state[key] = [];
  } else {
    state[key] = Array.from({length: issues}, (_, i) => i);
  }
  saveState();
  render();
}

function toggleIssue(eraId, blockId, runIdx, issueIdx, issues) {
  const key = getRunKey(eraId, blockId, runIdx);
  let arr = state[key] || [];
  if (arr.includes(issueIdx)) {
    arr = arr.filter(i => i !== issueIdx);
  } else {
    arr.push(issueIdx);
  }
  state[key] = arr;
  saveState();
  render();
}

function expandRun(el) {
  el.closest('.run').classList.toggle('expanded');
}

// ===================== STATS =====================
function computeStats() {
  let total = 0, done = 0;
  roadmap.forEach(era => {
    era.blocks.forEach(block => {
      block.runs.forEach((run, rIdx) => {
        total += run.issues;
        const key = getRunKey(era.id, block.id, rIdx);
        done += (state[key] || []).length;
      });
    });
  });
  return { total, done, left: total - done };
}

function computeEraStats(eraId) {
  const era = roadmap.find(e => e.id === eraId);
  let total = 0, done = 0;
  era.blocks.forEach(block => {
    block.runs.forEach((run, rIdx) => {
      total += run.issues;
      const key = getRunKey(eraId, block.id, rIdx);
      done += (state[key] || []).length;
    });
  });
  return { total, done, left: total - done };
}

function computeBlockStats(eraId, blockId) {
  const era = roadmap.find(e => e.id === eraId);
  const block = era.blocks.find(b => b.id === blockId);
  let total = 0, done = 0;
  block.runs.forEach((run, rIdx) => {
    total += run.issues;
    const key = getRunKey(eraId, blockId, rIdx);
    done += (state[key] || []).length;
  });
  return { total, done, left: total - done };
}

function updateAllStats() {
  const g = computeStats();
  document.getElementById('total-total').textContent = g.total;
  document.getElementById('total-done').textContent = g.done;
  document.getElementById('total-left').textContent = g.left;
  const pct = g.total ? g.done / g.total : 0;
  const circ = 87.96;
  document.getElementById('total-ring').style.strokeDashoffset = circ - (pct * circ);

  roadmap.forEach(era => {
    const s = computeEraStats(era.id);
    const fill = document.getElementById(`era-fill-${era.id}`);
    if (fill) fill.style.width = (s.total ? (s.done / s.total * 100) : 0) + '%';
  });
}

// ===================== RENDER =====================
function renderSidebar() {
  const nav = document.getElementById('sidebar');
  nav.innerHTML = '';
  roadmap.forEach(era => {
    const s = computeEraStats(era.id);
    const pct = s.total ? Math.round(s.done / s.total * 100) : 0;
    const el = document.createElement('div');
    el.className = 'era-nav-item' + (era.id === currentEraId ? ' active' : '');
    el.onclick = () => { currentEraId = era.id; render(); };
    el.innerHTML = `
      <div class="era-nav-title">${era.name}</div>
      <div class="era-nav-sub">${era.subtitle} · ${pct}%</div>
      <div class="era-nav-progress"><div class="era-nav-progress-fill" id="era-fill-${era.id}" style="width:${pct}%"></div></div>
    `;
    nav.appendChild(el);
  });
}

function renderMain() {
  const main = document.getElementById('main');
  const era = roadmap.find(e => e.id === currentEraId);
  const s = computeEraStats(era.id);
  const pct = s.total ? Math.round(s.done / s.total * 100) : 0;

  let html = `
    <div class="era-header">
      <h1 style="color:${era.color}">${era.name}</h1>
      <div class="meta">${era.subtitle} · ${era.date} · ${s.done}/${s.total} read (${pct}%)</div>
    </div>
    <div class="actions">
      <button class="btn" onclick="expandAll()">Expand All</button>
      <button class="btn" onclick="collapseAll()">Collapse All</button>
      <button class="btn btn-danger" onclick="resetEra()">Reset Era</button>
    </div>
    <div class="era-stats-bar">
      <div class="stat-card"><div class="label">Total Issues</div><div class="number">${s.total}</div></div>
      <div class="stat-card"><div class="label">Completed</div><div class="number" style="color:var(--success)">${s.done}</div></div>
      <div class="stat-card"><div class="label">Remaining</div><div class="number" style="color:var(--danger)">${s.left}</div></div>
      <div class="stat-card"><div class="label">Progress</div><div class="number">${pct}%</div></div>
    </div>
  `;

  era.blocks.forEach(block => {
    const bs = computeBlockStats(era.id, block.id);
    const bpct = bs.total ? Math.round(bs.done / bs.total * 100) : 0;
    html += `
      <div class="block" id="block-${block.id}">
        <div class="block-header" onclick="toggleBlock('${block.id}')">
          <div class="block-title-group">
            <div class="block-title">${block.name}</div>
            <div class="block-date">${block.date}</div>
          </div>
          <div class="block-progress">${bs.done}/${bs.total} (${bpct}%)</div>
          <div class="chevron">▼</div>
        </div>
        <div class="block-body">
          <div class="block-content">
    `;
    block.runs.forEach((run, rIdx) => {
      const complete = isRunComplete(era.id, block.id, rIdx, run.issues);
      const partial = isRunPartial(era.id, block.id, rIdx, run.issues);
      const checkedClass = complete ? 'checked' : partial ? 'partial' : '';
      const badge = run.type === 'event' ? '<span class="badge badge-event">Event</span>' : run.essential ? '<span class="badge badge-essential">⭐</span>' : run.optional ? '<span class="badge badge-optional">Opt</span>' : '';
      html += `
        <div class="run" id="run-${block.id}-${rIdx}">
          <div class="run-header" onclick="toggleRun('${era.id}', '${block.id}', ${rIdx}, ${run.issues})">
            <div class="checkbox ${checkedClass}">${complete ? '✓' : partial ? '◐' : ''}</div>
            <div class="run-info">
              <div class="run-title">${run.title} ${badge}</div>
              <div class="run-meta">${run.range}</div>
            </div>
            <div class="run-count">${run.issues} issue${run.issues > 1 ? 's' : ''}</div>
          </div>
          <div class="run-issues">
      `;
      for (let i = 0; i < run.issues; i++) {
        const key = getRunKey(era.id, block.id, rIdx);
        const arr = state[key] || [];
        const read = arr.includes(i);
        html += `<div class="issue-chip ${read ? 'read' : ''}" onclick="event.stopPropagation(); toggleIssue('${era.id}', '${block.id}', ${rIdx}, ${i}, ${run.issues})">#${i+1}</div>`;
      }
      html += `
          </div>
          <span class="expand-btn" onclick="event.stopPropagation(); expandRun(this)">Toggle issues</span>
        </div>
      `;
    });
    html += `
          </div>
        </div>
      </div>
    `;
  });

  main.innerHTML = html;
}

function render() {
  renderSidebar();
  renderMain();
  updateAllStats();
}

function toggleBlock(id) {
  document.getElementById('block-' + id).classList.toggle('open');
}

function expandAll() {
  document.querySelectorAll('.block').forEach(b => b.classList.add('open'));
}

function collapseAll() {
  document.querySelectorAll('.block').forEach(b => b.classList.remove('open'));
}

function resetEra() {
  if (!confirm('Reset all progress for this era?')) return;
  const era = roadmap.find(e => e.id === currentEraId);
  era.blocks.forEach(block => {
    block.runs.forEach((_, rIdx) => {
      const key = getRunKey(era.id, block.id, rIdx);
      delete state[key];
    });
  });
  saveState();
  render();
}

// ===================== INIT =====================
loadState();
render();
</script>
</body>
</html>
